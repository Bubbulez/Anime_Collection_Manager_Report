<!DOCTYPE html>
<html>
<head>
    <title>Add Anime</title>
</head>
<body>

<nav>
    <a href="/">Home</a> |
    <a href="/add">Add Anime</a> |
    <a href="/list">View Collection</a> |
    <a href="/search">Search Anime</a> |
    <a href="/recommend">Recommendations</a> |
    <a href="/stats">Statistics</a>
</nav>

<hr>

<h1>Add Anime</h1>

{% if message %}
    <p><strong>{{ message }}</strong></p>
{% endif %}

<form method="POST">

    <label>Title:</label><br>
    <input type="text" name="title" required><br><br>

    <label>Genre:</label><br>
    <input type="text" name="genre"><br><br>

    <label>Episodes:</label><br>
    <input type="number" name="episodes"><br><br>

    <label>Rating:</label><br>
    <input type="number" step="0.1" name="rating"><br><br>

    <label>Status:</label><br>
    <select name="watch_status">
        <option>Watching</option>
        <option>Completed</option>
        <option>Plan to Watch</option>
        <option>Paused</option>
        <option>Dropped</option>
    </select>

    <br><br>

    <button type="submit">Add Anime</button>

</form>

</body>
</html>
